# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo → New Blueprint → select render.yaml

services:
  - type: web
    name: pulseboard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start.sh
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulseboard-redis
          type: keyvalue
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false

  - type: worker
    name: pulseboard-celery-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app worker --loglevel=info
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulseboard-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: pulseboard-api
          type: web
          envVarKey: SECRET_KEY
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "false"

  - type: worker
    name: pulseboard-celery-beat
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app beat --loglevel=info
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulseboard-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: pulseboard-api
          type: web
          envVarKey: SECRET_KEY
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "false"

  - type: keyvalue
    name: pulseboard-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    # Required by Render — empty list = internal Render services only (API + workers)
    ipAllowList: []

databases:
  - name: pulseboard-db
    plan: free
    databaseName: pulseboard
    user: pulseboard
